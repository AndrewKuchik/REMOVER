<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REMOVER — удаление фона</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">✂️ REMOVER</div>
        <div class="tagline">Удаление фона прямо в браузере — бесплатно, приватно, в полном разрешении</div>
      </header>

      <main id="main">
        <!-- Зона загрузки -->
        <label id="drop" class="drop">
          <input id="file" type="file" accept="image/*" hidden />
          <div class="drop-inner">
            <div class="drop-icon">🖼️</div>
            <div class="drop-title">Перетащи картинку сюда</div>
            <div class="drop-sub">или нажми, чтобы выбрать файл</div>
          </div>
        </label>

        <!-- Прогресс -->
        <div id="status" class="status" hidden>
          <div class="spinner"></div>
          <span id="status-text">Обработка…</span>
        </div>

        <!-- Результат -->
        <div id="result" class="result" hidden>
          <!-- Режим качества -->
          <div class="modebar">
            <span class="bgbar-title">Режим:</span>
            <label class="mode"><input type="radio" name="mode" value="fast" checked /> ⚡ Быстро</label>
            <label class="mode"><input type="radio" name="mode" value="pro" /> 💎 Качество</label>
            <span class="mode-hint">«Качество» точнее на волосах/кружеве (первый раз качает модель).</span>
          </div>

          <!-- Сравнение до/после -->
          <div class="stage">
            <div class="compare" id="compare">
              <img id="orig-img" alt="Оригинал" />
              <div class="cutout-layer checker" id="cutout-layer">
                <canvas id="result-canvas"></canvas>
              </div>
              <div class="divider" id="divider"></div>
            </div>
          </div>
          <input id="compare-range" class="compare-range" type="range" min="0" max="100" value="100" />
          <div class="compare-hint">◀ тяни: слева оригинал · справа результат ▶</div>

          <!-- Фон для проверки края -->
          <div class="bgbar">
            <span class="bgbar-title">Фон:</span>
            <button class="sw sw-checker active" data-bg="checker" title="Прозрачный"></button>
            <button class="sw" data-bg="#ffffff" style="background:#ffffff" title="Белый"></button>
            <button class="sw" data-bg="#111318" style="background:#111318" title="Чёрный"></button>
            <button class="sw" data-bg="#5b8cff" style="background:#5b8cff" title="Синий"></button>
            <button class="sw" data-bg="#35c48f" style="background:#35c48f" title="Зелёный"></button>
            <label class="sw sw-custom" title="Свой цвет">🎨<input id="bg-color" type="color" value="#ff5aa5" /></label>
          </div>

          <!-- Настройки края -->
          <div class="controls">
            <div class="control">
              <label>Обрезать каёмку: <b id="v-shrink">1</b> px</label>
              <input id="shrink" type="range" min="0" max="6" step="1" value="1" />
            </div>
            <div class="control">
              <label>Мягкость края: <b id="v-feather">1</b> px</label>
              <input id="feather" type="range" min="0" max="6" step="1" value="1" />
            </div>
            <div class="control control-check">
              <label><input id="decont" type="checkbox" checked /> Очищать цвет каёмки</label>
            </div>
          </div>

          <div class="actions">
            <button id="download" class="btn btn-primary">⬇️ Скачать PNG</button>
            <button id="again" class="btn">Другая картинка</button>
          </div>
        </div>
      </main>

      <footer class="foot">Работает без сервера. Картинки не покидают твоё устройство.</footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
